repos:
  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        language: system
        entry: golangci-lint run --fix
        pass_filenames: false
        always_run: true

      - id: go-unit-tests
        name: unit tests
        language: system
        entry: go test -count=1 ./...
        pass_filenames: false
        always_run: true

      - id: web-tests
        name: web tests (vitest)
        language: system
        entry: npm --prefix web run test
        pass_filenames: false
        always_run: true
